            - generic "你" [ref=e238]:
              - paragraph [ref=e241]: 我最近学习压力很大，应该怎么调整？
            - generic "AI 咨询助手" [ref=e242]:
              - generic [ref=e245]:
                - paragraph [ref=e246]: 你好！听到你最近学习压力很大，非常理解这种感受。在南昌航空大学这样注重实践与学术并重的环境中，学业节奏紧凑是常态。
                - paragraph [ref=e247]:
                  - text: 作为 AI 辅导员助手，我无法访问你的个人成绩或具体课表，但我可以为你提供一套
                  - strong [ref=e248]: 清晰、克制且可执行
                  - text: 的减压建议，帮助你重新找回节奏：
                - heading "1. 紧急“物理”阻断（立即执行）" [level=3] [ref=e249]
                - paragraph [ref=e250]: 当压力导致大脑过载时，不要试图继续强行输入信息，先让身体“停机”。
                - list [ref=e251]:
                  - listitem [ref=e252]:
                    - strong [ref=e253]: 深呼吸法
                    - text: ：尝试"4-7-8"呼吸法（吸气 4 秒，憋气 7 秒，呼气 8 秒），重复 3-5 次。这能迅速降低心率，缓解焦虑生理反应。
                  - listitem [ref=e254]:
                    - strong [ref=e255]: 暂时脱离环境
                    - text: ：离开书桌或教室，去图书馆外的走廊、操场走一圈，或者去食堂吃顿热饭。改变物理空间有助于切断当前的焦虑循环。
                - heading "2. 任务拆解与优先级管理（认知调整）" [level=3] [ref=e256]
                - paragraph [ref=e257]: 压力往往源于“任务看起来太庞大”。
                - list [ref=e258]:
                  - listitem [ref=e259]:
                    - strong [ref=e260]: 微步骤化
                    - text: ：将一个大作业或复习计划拆解为
                    - strong [ref=e261]: 15-20 分钟
                    - text: 就能完成的小任务。例如，不是“复习高数”，而是“做完这页的 3 道例题”。
                  - listitem [ref=e262]:
                    - strong [ref=e263]: 艾森豪威尔矩阵
                    - text: ：列出待办事项，区分“重要且紧急”、“重要不紧急”等。优先处理必须今天完成的事，对于非紧急事项，允许自己推迟到明天或后天。
                  - listitem [ref=e264]:
                    - strong [ref=e265]: 接受“完成优于完美”
                    - text: ：在高压期，先追求把任务做出来，再考虑优化细节。
                - heading "3. 利用校内资源（外部支持）" [level=3] [ref=e266]
                - paragraph [ref=e267]: 如果自我调节效果有限，请善用学校提供的支持系统：
                - list [ref=e268]:
                  - listitem [ref=e269]:
                    - strong [ref=e270]: 心理咨询中心
                    - text: ：如果你感到情绪持续低落、失眠或无法集中注意力，建议预约学校的专业心理咨询师。他们能提供保密且专业的疏导。
                    - list [ref=e271]:
                      - listitem [ref=e272]:
                        - emphasis [ref=e273]: 提示：你可以关注“南昌航空大学”官方公众号或校园网查询具体的预约方式和值班时间。
                  - listitem [ref=e274]:
                    - strong [ref=e275]: 学业导师/班主任
                    - text: ：如果是课程难度过大或挂科风险导致的压力，主动联系你的任课老师或辅导员，说明困难，寻求针对性的学习指导或缓考政策咨询。
                  - listitem [ref=e276]:
                    - strong [ref=e277]: 同伴互助
                    - text: ：找一位靠谱的同学组成“学习搭子”，互相监督进度，有时仅仅是有人陪伴自习
