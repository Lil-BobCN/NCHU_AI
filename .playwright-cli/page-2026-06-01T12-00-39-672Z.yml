                  - heading "❌ 错误原因说明" [level=3] [ref=e426]
                  - paragraph [ref=e427]:
                    - text: 在 Python 中，
                    - code [ref=e428]: +
                    - text: 运算符的行为取决于操作数的类型：
                  - list [ref=e429]:
                    - listitem [ref=e430]:
                      - text: 如果两个操作数都是数字（如
                      - code [ref=e431]: 2 + 3
                      - text: ），则执行数学加法。
                    - listitem [ref=e432]:
                      - text: 如果两个操作数都是字符串（如
                      - code [ref=e433]: "\"2\" + \"3\""
                      - text: ），则执行字符串拼接。
                    - listitem [ref=e434]:
                      - strong [ref=e435]: 当前情况
                      - text: ：你的代码试图将整数
                      - code [ref=e436]: "2"
                      - text: 和字符串
                      - code [ref=e437]: "\"3\""
                      - text: 直接相加。Python 不知道你是想算出数字
                      - code [ref=e438]: "5"
                      - text: ，还是拼接成字符串
                      - code [ref=e439]: "\"23\""
                      - text: ，因此抛出了类型错误。
