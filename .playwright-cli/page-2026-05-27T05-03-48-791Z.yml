              - paragraph [ref=e93]: 我和室友发生矛盾，不知道怎么开口沟通。
              - generic [ref=e95]:
                - generic [ref=e97]: AI 咨询助手
                - generic [ref=e99]:
                  - paragraph [ref=e100]: 你好。室友之间因生活习惯、作息或观念不同产生摩擦，是大学期间非常常见的情况。感到困扰或不知道如何开口，是很正常的情绪反应。
                  - paragraph [ref=e101]: 作为 AI 助手，我无法介入你们的私人关系，但可以给你一些沟通上的建议，供你参考：
                  - paragraph [ref=e102]:
                    - strong [ref=e103]: 1. 沟通前的准备
                  - list [ref=e104]:
                    - listitem [ref=e105]:
                      - strong [ref=e106]: 冷静情绪：
                      - text: 避免在愤怒或情绪激动时沟通，先给自己一点时间平复。
                    - listitem [ref=e107]:
                      - strong [ref=e108]: 明确诉求：
                      - text: 想清楚你希望解决的具体问题是什么（例如：噪音、卫生、作息），而不是针对对方的人格。
                  - paragraph [ref=e109]:
                    - strong [ref=e110]: 2. 选择合适的时机与方式
                  - list [ref=e111]:
                    - listitem [ref=e112]:
                      - strong [ref=e113]: 私下交流：
                      - text: 找一个双方都比较放松、没有第三方在场的时间，避免在公共场合或群里争执。
                    - listitem [ref=e114]:
                      - strong [ref=e115]: 温和开场：
                      - text: 可以尝试用“最近感觉我们之间有些误会，想和你聊聊”作为开场白，而不是直接指责。
                  - paragraph [ref=e116]:
                    - strong [ref=e117]: 3. 使用非暴力沟通方式
                  - list [ref=e118]:
                    - listitem [ref=e119]:
                      - strong [ref=e120]: 多用“我”字句：
                      - text: 表达你的感受，而不是评判对方。例如：“我最近睡眠比较浅，晚上听到声音容易醒”，而不是“你晚上太吵了”。
                    - listitem [ref=e121]:
                      - strong [ref=e122]: 倾听对方：
                      - text: 给对方表达的机会，也许对方也有未说出的困扰。
                  - paragraph [ref=e123]:
                    - strong [ref=e124]: 4. 寻求外部支持（如果沟通无效）
                  - list [ref=e125]:
                    - listitem [ref=e126]:
                      - strong [ref=e127]: 联系辅导员：
                      - text: 如果矛盾无法自行化解，可以联系你的年级辅导员，他们经验丰富，能协助调解。
                    - listitem [ref=e128]:
                      - strong [ref=e129]: 心理咨询中心：
                      - text: 如果这件事让你感到焦虑或压力过大，南昌航空大学心理健康教育中心可以提供专业的心理支持。
                    - listitem [ref=e130]:
                      - strong [ref=e131]: 宿舍调整：
                      - text: 在极个别情况下，如果确实无法共存，可咨询学院是否有宿舍调整的政策。
                  - paragraph [ref=e132]:
                    - strong [ref=e133]: ⚠️ 重要提醒
                  - list [ref=e134]:
                    - listitem [ref=e135]:
                      - text: 如果矛盾升级为
                      - strong [ref=e136]: 言语威胁、肢体冲突
                      - text: ，或你感到
                      - strong [ref=e137]: 人身安全受到威胁
                      - text: ，请立即离开现场，联系学校保卫处或拨打 110。
                    - listitem [ref=e138]: 如果你感到情绪极度低落、有伤害自己或他人的念头，请务必立即联系信任的老师、家人，或前往医院就诊。
                  - paragraph [ref=e139]: 我是 AI 辅导员 Demo，以上建议仅供参考。希望你能顺利解决困扰，照顾好自己。
              - paragraph [ref=e143]: 你好
              - generic [ref=e145]:
