                    - img [ref=e238] [cursor=pointer]
                - generic [ref=e244]:
                  - paragraph [ref=e245]: 你好！作为产品设计评审专家，针对南昌航空大学 AI 辅导员 Chatbox 项目，若要复刻 Kimi（月之暗面）那种“极简、流畅、高智商感”的交互风格，不能仅停留在 UI 层面的模仿，必须深入到底层架构与交互逻辑的协同。
                  - paragraph [ref=e246]:
                    - text: 以下是基于你提出的七个维度的详细设计方案，并特别标注了
                    - strong [ref=e247]: 必须后端真实支持
                    - text: 的核心能力。
                  - separator [ref=e248]
                  - heading "1. 空态设计 (Empty State)" [level=3] [ref=e249]
                  - paragraph [ref=e250]:
                    - strong [ref=e251]: 设计目标
                    - text: ：消除冷启动焦虑，引导用户自然开口，体现“懂学校”的亲切感。
                  - list [ref=e252]:
                    - listitem [ref=e253]:
                      - strong [ref=e254]: 前端表现
                      - text: ： *
                      - strong [ref=e255]: 文案策略
                      - text: ：避免通用的“有什么可以帮您？”。应结合场景动态展示，如：“同学你好，我是你的 AI 辅导员。想查课表、问政策，还是聊聊社团活动？”
                    - listitem [ref=e256]:
                      - strong [ref=e257]: 快捷气泡
                      - text: ：提供 3-4 个高频场景胶囊（如：查询学分绩点、预约心理咨询、报修流程、校历查询）。 *
                      - strong [ref=e258]: 视觉风格
                      - text: ：留白充足，无干扰元素，头像采用南航辅导员 IP 形象或简洁图标。
                    - listitem [ref=e259]:
                      - strong [ref=e260]: ✅ 必须后端真实支持的能力
                      - text: ： *
                      - strong [ref=e261]: 上下文感知/意图预演
                      - text: ：后端需根据当前时间（如考试周、开学季）或用户历史标签（如有），动态生成不同的欢迎语和推荐问题，而非静态硬编码。
                      - list [ref=e262]:
                        - listitem [ref=e263]:
                          - strong [ref=e264]: 合规性校验
                          - text: ：后端需预先配置好敏感词库，确保推荐的快捷问题符合学校宣传规范。
                  - heading "2. 输入区设计 (Input Area)" [level=3] [ref=e265]
                  - paragraph [ref=e266]:
                    - strong [ref=e267]: 设计目标
                    - text: ：降低输入门槛，支持多模态，保持界面整洁。*
                    - strong [ref=e268]: 前端表现
                    - text: ： *
                    - strong [ref=e269]: 布局
                    - text: ：底部固定，圆角矩形，右侧为发送按钮。 *
                    - strong [ref=e270]: 功能入口
                    - text: ：左侧集成“文件上传”图标（支持 PDF、图片、截图），暗示支持长文档分析。 *
                    - strong [ref=e271]: 智能提示
                    - text: ：当用户输入模糊时，输入框上方出现“您可能想问..."的下拉建议。 *
                    - strong [ref=e272]: 状态反馈
                    - text: ：点击发送后，输入框瞬间变为加载动画，无需跳转页面。
                  - list [ref=e273]:
                    - listitem [ref=e274]:
                      - strong [ref=e275]: ✅ 必须后端真实支持的能力
                      - text: ：
                      - list [ref=e276]:
                        - listitem [ref=e277]:
                          - strong [ref=e278]: 实时语义补全 (Completion API)
                          - text: ：下拉建议不能是简单的关键词匹配，需调用大模型进行实时预测，根据当前对话流生成最可能的后续意图。
                        - listitem [ref=e279]:
                          - strong [ref=e280]: 多模态解析管线
                          - text: ：后端必须具备 OCR（文字识别）、PDF 解析及图像理解能力，能将用户上传的文件内容转化为 Token 喂给模型，否则前端只能传文件名，无法实现“读懂文件”的效果。
                  - heading "3. 复杂问题回复过程 (Complex Response Flow)" [level=3] [ref=e281]
                  - paragraph [ref=e282]:
                    - strong [ref=e283]: 设计目标
                    - text: ：模拟人类思考过程，避免“秒回”带来的机械感，建立信任。
                  - list [ref=e284]:
                    - listitem [ref=e285]:
                      - strong [ref=e286]: 前端表现
                      - text: ： *
                      - strong [ref=e287]: 打字机效果
                      - text: ：字符逐个浮现，但速度要快且均匀。
                      - list [ref=e288]:
                        - listitem [ref=e289]:
                          - strong [ref=e290]: 思维链可视化 (CoT)
                          - text: ：对于复杂问题（如“帮我规划考研复习计划”），在正文前显示一个折叠的“思考中..."模块，展开后展示分步逻辑（1.分析现状 -> 2.制定阶段目标 -> 3.推荐资源）。
                        - listitem [ref=e291]:
                          - strong [ref=e292]: 流式渲染优化
                          - text: ：首字延迟控制在 500ms 以内，中间不卡顿。
                    - listitem [ref=e293]:
                      - strong [ref=e294]: ✅ 必须后端真实支持的能力
                      - text: ：
                      - list [ref=e295]:
                        - listitem [ref=e296]:
                          - strong [ref=e297]: 流式输出 (SSE/WebSocket)
                          - text: ：这是核心。后端必须支持
                          - code [ref=e298]: Server-Sent Events
                          - text: 协议，将生成的文本切分成小块实时推送，前端才能逐字显示。如果后端一次性返回完整 JSON，前端只能等待，无法实现“边写边看”的体验。
                        - listitem [ref=e299]:
                          - strong [ref=e300]: 结构化思维链生成
                          - text: ：后端模型需开启 CoT 模式，并在输出流中嵌入特定的标记（如
                          - code [ref=e301]: <thought>
                          - text: ），前端据此解析并渲染“思考过程”面板。
                  - heading "4. 工具/来源▋" [level=3] [ref=e302]
