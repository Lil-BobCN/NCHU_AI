                - generic [ref=e282]:
                  - paragraph [ref=e283]: 根据联网检索结果，Kimi 官网（kimi.com / kimi.moonshot.cn）首页当前公开展示的主要入口可归纳为以下三条要点：
                  - heading "1. 核心对话与前沿 Agent 交互入口" [level=3] [ref=e284]
                  - paragraph [ref=e285]:
                    - text: 首页视觉中心为智能对话输入区（标语为“尽管问”），默认接入最新的 Kimi K2.6 模型。该区域不仅是基础的文本问答入口，还公开展示了
                    - strong [ref=e286]: 全新建站功能
                    - text: （一句话生成可交互网站）、
                    - strong [ref=e287]: Office 文档一键处理
                    - text: ，以及
                    - strong [ref=e288]: Agent 集群（如 Kimi Claw 群组）
                    - text: 等多智能体协作的交互入口。
                  - heading "2. Kimi+ 应用广场与垂直工具入口" [level=3] [ref=e289]
                  - paragraph [ref=e290]:
                    - text: 通过首页侧边栏或导航，用户可进入“Kimi+ 广场”及各类专项生产力工具入口。主要包括：
                    - strong [ref=e291]: PPT/幻灯片助手
                    - text: 、
                    - strong [ref=e292]: 深度研究
                    - text: 、
                    - strong [ref=e293]: Kimi Code
                    - text: （代码辅助）、
                    - strong [ref=e294]: Kimi WebBridge
                    - text: 以及各类预设的智能体应用，覆盖学术研究、数据分析、办公写作等垂直场景。
                  - heading "3. 多端下载、账户与开发者 API 入口" [level=3] [ref=e295]
                  - paragraph [ref=e296]:
                    - text: 首页顶部及全局导航栏提供了明确的**“下载 APP”
                    - strong [ref=e297]: （涵盖 iOS、Android 及 Windows 客户端）与
                    - text: “登录/注册”**入口。此外，首页及底部导航也提供了面向开发者的
                    - strong [ref=e298]: Kimi API 开放平台
                    - text: （platform.kimi.com）入口，以及会员订阅和帮助中心指南。
                  - separator [ref=e299]
                  - paragraph [ref=e300]:
                    - strong [ref=e301]: 参考来源：
                  - list [ref=e302]:
                    - listitem [ref=e303]:
                      - strong [ref=e304]: Kimi 官方网站
                      - text: （
                      - code [ref=e305]: www.kimi.com/zh
                      - text: 及
                      - code [ref=e306]: kimi.moonshot.cn
                      - text: ）：首页 UI 布局、K2.6 模型发布通告及顶部导航栏信息。
                    - listitem [ref=e307]:
                      - strong [ref=e308]: Kimi 官方帮助中心
                      - text: （
                      - code [ref=e309]: www.kimi.com/zh-cn/help
                      - text: ）：关于网页版界面介绍及 Agent 模式、Kimi+、幻灯片、网页生成、API 等功能模块的官方指南。
                    - listitem [ref=e310]:
                      - strong [ref=e311]: 第三方应用分发平台
                      - text: （Apple App Store、Microsoft Store 等）：关于 Kimi 多端下载入口、客户端支持及界面功能布局的产品描述。
