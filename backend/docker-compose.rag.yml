# ==========================================
# NCHU AI Counselor - RAG Infrastructure
# ==========================================
# Multi-service compose for FastAPI + PostgreSQL(pgvector) + Qdrant + Redis
# Use: docker compose -f docker-compose.rag.yml up -d

services:
  api:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: nchu-counselor-api
    restart: always
    ports:
      - "8000:8000"
    env_file:
      - .env
    volumes:
      - ./app:/app/app:ro
    depends_on:
      postgres:
        condition: service_healthy
      qdrant:
        condition: service_healthy
      redis:
        condition: service_healthy
    networks:
      - counselor-network

  postgres:
    image: pgvector/pgvector:pg16
    container_name: nchu-counselor-postgres
    restart: always
    ports:
      - "5432:5432"
    environment:
      - POSTGRES_USER=${POSTGRES_USER:-counselor}
      - POSTGRES_PASSWORD=${POSTGRES_PASSWORD:-counselor_pass}
      - POSTGRES_DB=${POSTGRES_DB:-counselor_db}
    volumes:
      - postgres-data:/var/lib/postgresql/data
      - ./scripts/init-db.sql:/docker-entrypoint-initdb.d/init-db.sql:ro
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-counselor} -d ${POSTGRES_DB:-counselor_db}"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 10s
    networks:
      - counselor-network

  qdrant:
    image: qdrant/qdrant:v1.7.0
    container_name: nchu-counselor-qdrant
    restart: always
    ports:
      - "6333:6333"
      - "6334:6334"
    volumes:
      - qdrant-data:/qdrant/storage
    healthcheck:
      test: ["CMD-SHELL", "bash -c 'echo > /dev/tcp/localhost/6333' || exit 1"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 15s
    networks:
      - counselor-network

  redis:
    image: redis:7-alpine
    container_name: nchu-counselor-redis
    restart: always
    ports:
      - "6379:6379"
    volumes:
      - redis-data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 5s
    networks:
      - counselor-network

volumes:
  postgres-data:
  qdrant-data:
  redis-data:

networks:
  counselor-network:
    driver: bridge
