# ==========================================
# 南昌航空大学AI助手 - Nginx配置
# ==========================================

server {
    listen 80;
    server_name localhost;

    # 主页
    location = / {
        root /usr/share/nginx/html/static;
        try_files /index.html =404;
    }

    # 配置文件
    location = /config.js {
        root /usr/share/nginx/html/static;
        try_files /config.js =404;
    }

    # 学工处资源文件
    location /xgc-resources/ {
        alias /usr/share/nginx/html/static/xgc-resources/;
        expires 30d;
        add_header Cache-Control "public, immutable";
    }

    # 静态资源服务
    location /static/ {
        alias /usr/share/nginx/html/static/;

        # JS/CSS 文件短缓存 + 需验证
        # 注意：不使用嵌套 location + alias（nginx 已知 bug 会导致 301）
        location ~* \.(js|css)$ {
            add_header Cache-Control "public, must-revalidate";
            expires 1h;
            gzip on;
            gzip_types text/css application/javascript;
        }

        # 图片等静态资源长缓存
        location ~* \.(png|jpg|jpeg|gif|ico|svg|woff|woff2|ttf|eot)$ {
            add_header Cache-Control "public, max-age=2592000, immutable";
            expires 30d;
        }

        # HTML 文件不缓存
        location ~* \.html$ {
            add_header Cache-Control "no-cache, no-store, must-revalidate";
        }

        # 默认缓存
        add_header Cache-Control "public";
    }

    # 登录页面
    location = /login {
        root /usr/share/nginx/html/static;
        try_files /login.html =404;
    }

    # 登录页面（带.html后缀）
    location = /login.html {
        root /usr/share/nginx/html/static;
        try_files /login.html =404;
    }

    # 管理员用户列表页面
    location = /admin/users {
        root /usr/share/nginx/html/static;
        try_files /admin-users.html =404;
    }

    location = /admin/users.html {
        root /usr/share/nginx/html/static;
        try_files /admin-users.html =404;
    }

    # RAG AI Chat 页面
    location = /rag-chat {
        root /usr/share/nginx/html/static;
        try_files /rag-chat.html =404;
    }

    location = /rag-chat.html {
        root /usr/share/nginx/html/static;
        try_files /rag-chat.html =404;
    }

    # API代理 - FastAPI RAG 系统（优先匹配 /api/v1/）
    # 通过宿主机网络访问独立运行的 FastAPI 容器
    location /api/v1/ {
        proxy_pass http://host.docker.internal:8000;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;

        # SSE支持
        proxy_buffering off;
        proxy_read_timeout 86400;
        proxy_cache off;

        # CORS 头（FastAPI 使用 JWT，不需要 credentials）
        add_header Access-Control-Allow-Origin * always;
        add_header Access-Control-Allow-Methods "GET, POST, PUT, DELETE, OPTIONS" always;
        add_header Access-Control-Allow-Headers "Authorization, Content-Type" always;

        # 大请求体支持
        client_max_body_size 10M;
    }

    # API代理 - Flask AI 助手系统
    location /api/ {
        proxy_pass http://api:5000;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;

        # SSE支持
        proxy_buffering off;
        proxy_read_timeout 86400;

        # 大请求体支持
        client_max_body_size 10M;
    }

    # 其他未匹配请求返回 404（不代理到后端）
    location / {
        return 404;
    }

    # 错误页面
    error_page 500 502 503 504 /50x.html;
    location = /50x.html {
        root /usr/share/nginx/html;
    }
}
