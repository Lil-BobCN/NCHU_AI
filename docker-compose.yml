# ==========================================
# 南昌航空大学AI助手 - Docker Compose配置
# ==========================================
# 包含 Flask AI助手 + Nginx + Redis
# FastAPI RAG 系统使用 backend/docker-compose.rag.yml 独立启动

version: '3.8'

services:
  api:
    build: .
    container_name: ai-assistant-api
    restart: always
    env_file: .env
    ports:
      - "5000:5000"
    environment:
      - QWEN_API_KEY=${QWEN_API_KEY}
      - QWEN_MODEL=${QWEN_MODEL:-qwen3.5-plus}
      - HOST=0.0.0.0
      - PORT=5000
      - DEBUG=false
      - REDIS_HOST=redis
      - REDIS_PORT=6379
      - LOG_LEVEL=INFO
    volumes:
      - ./logs:/app/logs
    depends_on:
      redis:
        condition: service_healthy
    networks:
      - ai-assistant-network
    healthcheck:
      test: ["CMD", "python", "-c", "import urllib.request; urllib.request.urlopen('http://localhost:5000/health')"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 10s

  redis:
    image: redis:7-alpine
    container_name: ai-assistant-redis
    restart: always
    volumes:
      - redis-data:/data
    networks:
      - ai-assistant-network
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 5s

  nginx:
    image: nginx:alpine
    container_name: ai-assistant-nginx
    restart: always
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ./static:/usr/share/nginx/html/static:ro
      - ./nginx.conf:/etc/nginx/conf.d/default.conf:ro
    depends_on:
      - api
    networks:
      - ai-assistant-network
    extra_hosts:
      # 允许 nginx 访问宿主机上的 FastAPI（通过 host.docker.internal）
      - "host.docker.internal:host-gateway"

volumes:
  redis-data:

networks:
  ai-assistant-network:
    driver: bridge
